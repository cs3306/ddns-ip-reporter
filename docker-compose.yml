services:
  ddns:
    image: cs3306/ddns-ip-reporter:latest
    # build: .
    container_name: ddns
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DDNS_TOKEN=${DDNS_TOKEN}
    volumes:
      - ./nginx/sites:/etc/nginx/sites      # 用户放自己的 server 块配置
      - ./nginx/certs:/etc/nginx/certs      # 用户放证书
      - ./nginx/ddns:/etc/nginx/ddns        # 自动生成的 IP 变量文件（勿手动编辑）
      - ddns_data:/data                     # 持久化 state.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ddns_data:
