services:
  ddns:
    image: cs3306/ddns:latest        # 从 Docker Hub 拉取
    # build: .                       # 本地构建时取消注释
    container_name: ddns
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"        # 只监听本地，通过宿主机 nginx 反代暴露
    environment:
      - DDNS_TOKEN=${DDNS_TOKEN}     # 从 .env 文件读取
      - NGINX_CONF_DIR=/etc/nginx/conf.d
      - NGINX_RELOAD_CMD=nginx -s reload
      - STATE_FILE=/data/state.json
    volumes:
      - /etc/nginx/conf.d:/etc/nginx/conf.d          # 写入 upstream conf
      - /run/nginx.pid:/run/nginx.pid:ro              # nginx reload 需要读取 pid
      - /var/run/nginx:/var/run/nginx                 # nginx unix socket (如果用的话)
      - ddns_data:/data                               # 持久化 state.json
    # nginx -s reload 通过发送信号给宿主机 nginx 进程实现
    # 需要容器内有 nginx 二进制（已在 Dockerfile 中安装）
    pid: host                        # 共享宿主机 PID namespace，使信号能发到宿主机进程
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ddns_data:
