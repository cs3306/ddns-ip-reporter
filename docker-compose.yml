services:
  ddns:
    image: cs3306/ddns-ip-reporter:latest
    container_name: ddns
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - DDNS_TOKEN=${DDNS_TOKEN}
      - NGINX_CONF_DIR=/etc/nginx/ddns
      - STATE_FILE=/data/state.json
    volumes:
      - /etc/nginx/ddns:/etc/nginx/ddns
      - /run/nginx.pid:/run/nginx/nginx.pid:ro
      - ddns_data:/data
    pid: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ddns_data:
